# Blueprint opcional de Render — New > Blueprint > conectar repo
# Documentación completa: DEPLOY.md

databases:
  - name: foodalchemy-db
    databaseName: foodalchemy
    user: foodalchemy
    plan: free

services:
  - type: web
    name: foodalchemy-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: foodalchemy-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
