name: Agente IA — Revisión de PRs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    name: Análisis de código con IA
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Obtener diff del PR
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD -- \
            '*.py' '*.ts' '*.tsx' \
            ':!**/node_modules/**' ':!**/venv/**' \
            > pr_diff.txt
          echo "lines=$(wc -l < pr_diff.txt)" >> $GITHUB_OUTPUT

      - name: Analizar con Gemini
        id: analysis
        if: steps.diff.outputs.lines > 0
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF=$(head -c 8000 pr_diff.txt)

          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": \"Eres un revisor de código experto en Python/FastAPI y React/TypeScript. Analiza este diff de un Pull Request del proyecto FoodAlchemy (app de recetas con IA).\n\nDiff:\n\`\`\`\n${DIFF}\n\`\`\`\n\nResponde en español con este formato exacto:\n\n## 🤖 Revisión automática de código\n\n### ✅ Puntos positivos\n[2-3 cosas bien hechas]\n\n### ⚠️ Sugerencias de mejora\n[2-3 sugerencias concretas si las hay]\n\n### 🔒 Seguridad\n[Menciona si hay algún problema de seguridad, o 'Sin problemas detectados']\n\n### 📊 Evaluación general\n[Una línea con tu evaluación del cambio]\n\n---\n*Análisis generado automáticamente por Gemini 2.0 Flash*\"
                }]
              }]
            }")

          COMMENT=$(echo $RESPONSE | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          try:
              text = data['candidates'][0]['content']['parts'][0]['text']
              print(text)
          except:
              print('## 🤖 Revisión automática\n\nNo se pudo generar el análisis automático.')
          ")

          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comentar en el PR
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `${{ steps.analysis.outputs.comment }}`;

            // Buscar si ya existe un comentario del bot para actualizarlo
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c => 
              c.user.type === 'Bot' && 
              c.body.includes('Revisión automática de código')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }
