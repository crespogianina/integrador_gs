name: CI/CD — FoodAlchemy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: FoodAlchemy — Frontend (type check & build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # En CI no hay backend local; build con URL vacía (Vercel inyecta la real en deploy)
          VITE_API_URL: ''

      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: FoodAlchemy — Backend (syntax check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax
        run: |
          python -m py_compile main.py
          python -m py_compile services/gemini_service.py
          python -m py_compile api/v1/endpoints/auth.py
          echo "Syntax OK"

      # Render hace autodeploy desde GitHub al conectar el repo; no requiere step extra aquí.
